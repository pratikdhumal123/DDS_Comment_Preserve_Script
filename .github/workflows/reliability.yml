name: Reliability Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Unit tests
        run: |
          python -m unittest

      - name: Stress harness (all profiles)
        run: |
          python stress_comment_preservation_harness.py --iterations 120 --rows 24 --markers 12 --seed 13 --profile all --min-visible-rate 95

      - name: Stress harness (heading merge strict)
        run: |
          python stress_comment_preservation_harness.py --iterations 120 --rows 24 --markers 12 --seed 19 --profile heading-merge --min-visible-rate 95
